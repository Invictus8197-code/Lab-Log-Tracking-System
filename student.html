<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

    <div class="dashboard">

        <!-- Sidebar -->
        <aside class="sidebar">

            <div>
                <div class="logo">
                    <h1>LLTS</h1>
                    <p>Student Panel</p>
                </div>

                <nav>
                    <a href="student.html" class="active">Dashboard</a>
                    <a href="history.html">History</a>
                </nav>

            </div>  

            <button class="logout-btn" onclick="logout()">Logout</button>  

        </aside>


        <main class="main-content">

            <!-- Header -->
            <div class="top-bar">

                <div>
                    <h2>Student Dashboard</h2>
                    <p>Real-Time Session Tracking</p>
                </div>

                <div class="status">
                    ACTIVE SESSION
                </div>

            </div>


            <!-- Student Information -->
            <div class="student-grid">

                <div class="card">
                    <span>Name</span>
                    <h3 id="studentName">Loading...</h3>
                </div>

                <div class="card">
                    <span>Scholar Number</span>
                    <h3 id="studentScholar">Loading...</h3>
                </div>

                <div class="card">
                    <span>PC Number</span>
                    <h3 id="studentPC">Loading...</h3>
                </div>

                <div class="card">
                    <span>Course</span>
                    <h3 id="studentCourse">Loading...</h3>
                </div>

            </div>


            <div class="session-section">

                <!-- Timer Card -->
                <div class="timer-card">
                    <h3>Real-Time Timer</h3>
                    <div class="timer" id="timer">
                        00 : 00 : 00
                    </div>
                    <p>Tracking laboratory activity</p>

                </div>


                <!-- Control Card -->
                <div class="control-card">
                    <h3>Session Controls</h3>
                    <div class="btn-group">
                        <button class="start-btn" onclick="startTimer()">Start Task</button>
                        <button class="end-btn" onclick="showReport()">End Task</button>
                    </div>

                    <div class="task-status">
                        <label>Current Task</label>
                        <input type="text" id="currentTask" placeholder="Enter today's task..." onchange="updateCurrentTask()">
                    </div>
                </div>

            </div>


            <!-- Report Box -->
            <div class="report-box" id="reportBox">

                <div class="report-header">
                    <h3>Daily Work Report</h3>
                    <span>Mandatory</span>
                </div>

                <textarea placeholder="Write today's work in 3-4 points..."></textarea>

                <button class="submit-btn" onclick="submitReport()">Submit Report</button>

            </div>

        </main>

    </div>

 <script type="module" src="firebase.js"></script>
 <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
 <script defer src="script.js"></script>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
